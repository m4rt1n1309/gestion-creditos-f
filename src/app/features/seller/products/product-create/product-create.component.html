<p-toast />
<div class="p-4 max-w-2xl mx-auto">
  <h2 class="text-xl font-semibold mb-6">Nuevo producto</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="flex flex-col gap-1">
      <label for="title" class="text-sm font-medium"
        >Título (nombre corto) *</label
      >
      <input
        id="title"
        pInputText
        formControlName="title"
        placeholder="Título del producto"
        class="w-full h-11"
        [class.ng-invalid]="isInvalid('title')"
        [class.ng-dirty]="isInvalid('title')"
      />
      @if (isInvalid("title")) {
        <small class="text-red-500">{{ getError("title") }}</small>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label for="description" class="text-sm font-medium"
        >Descripción comercial</label
      >
      <textarea
        pInputTextarea
        id="description"
        formControlName="description"
        rows="3"
        placeholder="Nombre comercial o descripción del producto"
        [class.ng-invalid]="isInvalid('description')"
        [class.ng-dirty]="isInvalid('description')"
        class="w-full"
      ></textarea>
      @if (isInvalid("description")) {
        <small class="text-red-500">{{ getError("description") }}</small>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label for="model" class="text-sm font-medium">Modelo</label>
      <input
        id="model"
        pInputText
        formControlName="model"
        placeholder="Modelo técnico (opcional)"
        class="w-full h-11"
        [class.ng-invalid]="isInvalid('model')"
        [class.ng-dirty]="isInvalid('model')"
      />
      @if (isInvalid("model")) {
        <small class="text-red-500">{{ getError("model") }}</small>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">Marca</label>
        <p-dropdown
          formControlName="brandId"
          [options]="brandOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar marca"
          [showClear]="true"
          styleClass="w-full"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">Categoría</label>
        <p-dropdown
          formControlName="categoryId"
          [options]="categoryOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar categoría"
          [showClear]="true"
          styleClass="w-full"
        />
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <p-button
        type="submit"
        label="Registrar producto"
        icon="pi pi-check"
        [loading]="submitting"
        [disabled]="form.invalid || submitting"
      />
      <p-button
        type="button"
        label="Cancelar"
        severity="secondary"
        [outlined]="true"
        (onClick)="cancel()"
      />
    </div>
  </form>
</div>
