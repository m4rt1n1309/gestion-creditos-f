<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-md p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-blue-700">FinFlow</h1>
      <p class="text-gray-500 mt-1 text-sm">Portal del Cliente</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-5">
        <div class="flex flex-col gap-1">
          <label for="dni" class="text-sm font-medium text-gray-700">DNI</label>
          <input
            id="dni"
            pInputText
            formControlName="dni"
            placeholder="Tu número de documento"
            class="w-full"
            [class.ng-invalid]="submitted && form.controls['dni'].invalid"
            [class.ng-dirty]="submitted"
          />
          @if (submitted && form.controls["dni"].hasError("required")) {
            <small class="text-red-500">El DNI es requerido.</small>
          }
        </div>

        <div class="flex flex-col gap-1">
          <label for="password" class="text-sm font-medium text-gray-700"
            >Contraseña</label
          >
          <p-password
            id="password"
            formControlName="password"
            placeholder="Tu contraseña"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            [class.ng-invalid]="submitted && form.controls['password'].invalid"
            [class.ng-dirty]="submitted"
          />
          @if (submitted && form.controls["password"].hasError("required")) {
            <small class="text-red-500">La contraseña es requerida.</small>
          }
        </div>

        @if (errorMessage) {
          <div
            class="bg-red-50 border border-red-200 rounded-lg p-3 text-red-700 text-sm"
          >
            <i class="pi pi-exclamation-circle mr-2"></i>{{ errorMessage }}
          </div>
        }

        <button
          pButton
          type="submit"
          label="Ingresar"
          icon="pi pi-sign-in"
          class="w-full"
          [loading]="loading"
        ></button>
      </div>
    </form>
  </div>
</div>
