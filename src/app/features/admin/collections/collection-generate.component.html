<p-toast />

<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Generar planilla de cobro</h1>
      <p class="text-sm text-gray-500">Configurá los parámetros de la planilla.</p>
    </div>
    <p-button
      label="Cancelar"
      severity="secondary"
      [outlined]="true"
      (onClick)="cancel()"
    />
  </div>

  <p-message
    severity="warn"
    text="Si ya existe una planilla para este cobrador y fecha, será reemplazada automáticamente."
    styleClass="w-full mb-6"
  />

  <p-card styleClass="shadow-sm">
    <div class="flex flex-col gap-5">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Cobrador</label>
        <p-dropdown
          [options]="collectorOptions"
          [(ngModel)]="selectedCollectorId"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar cobrador..."
          styleClass="w-full"
          appendTo="body"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Fecha</label>
        <input
          type="date"
          [(ngModel)]="selectedDate"
          class="w-full h-11 px-3 rounded-xl border border-gray-300 bg-gray-50 text-sm text-gray-700 outline-none focus:border-blue-500"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Filtro de cuotas</label>
        <p-dropdown
          [options]="FILTER_OPTIONS"
          [(ngModel)]="selectedFilter"
          optionLabel="label"
          optionValue="value"
          styleClass="w-full"
          appendTo="body"
        />
      </div>

      <div class="flex justify-end pt-2">
        <p-button
          label="Generar planilla"
          icon="pi pi-check"
          (onClick)="confirm()"
          [loading]="processing"
          [disabled]="!isValid"
        />
      </div>
    </div>
  </p-card>
</div>
