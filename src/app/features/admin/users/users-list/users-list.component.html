<div class="p-4">
  <div class="flex flex-wrap gap-3 mb-4 items-center justify-between">
    <div class="flex flex-wrap gap-3 items-center">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          placeholder="Buscar por nombre, DNI o email"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          class="w-72"
        />
      </span>
      <p-dropdown
        [options]="roleOptions"
        [(ngModel)]="selectedRole"
        (onChange)="applyFilters()"
        placeholder="Rol"
        [showClear]="true"
        optionLabel="label"
        optionValue="value"
      />
      <p-dropdown
        [options]="statusOptions"
        [(ngModel)]="selectedStatus"
        (onChange)="applyFilters()"
        placeholder="Estado"
        [showClear]="true"
        optionLabel="label"
        optionValue="value"
      />
    </div>
    <p-button
      label="Nuevo usuario"
      icon="pi pi-plus"
      (onClick)="navigateToCreate()"
    />
  </div>

  @if (loading) {
    <app-loading-state />
  } @else if (error) {
    <app-error-state />
  } @else if (users.length === 0) {
    <app-empty-state />
  } @else {
    <p-table
      [value]="users"
      [paginator]="true"
      [rows]="15"
      [rowsPerPageOptions]="[15, 30, 50]"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Último acceso</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <div class="flex items-center gap-2">
              {{ user.fullName }}
              @if (user.lockedAt) {
                <i
                  class="pi pi-lock text-red-500 text-sm"
                  pTooltip="Usuario bloqueado"
                ></i>
              }
            </div>
          </td>
          <td>{{ user.dni }}</td>
          <td>{{ user.email ?? "—" }}</td>
          <td>
            <p-tag
              [value]="roleLabel(user.role)"
              [severity]="roleSeverity(user.role)"
            />
          </td>
          <td>
            <p-tag
              [value]="user.status === 'ACTIVE' ? 'Activo' : 'Inactivo'"
              [severity]="user.status === 'ACTIVE' ? 'success' : 'danger'"
            />
          </td>
          <td>
            {{
              user.lastLoginAt
                ? (user.lastLoginAt | date: "dd/MM/yyyy HH:mm")
                : "—"
            }}
          </td>
          <td>
            <p-button
              label="Ver"
              icon="pi pi-eye"
              severity="secondary"
              [outlined]="true"
              size="small"
              (onClick)="navigateToDetail(user.id)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
