<p-dialog
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '500px' }"
  styleClass="rounded-2xl overflow-hidden"
  [closable]="false"
>
  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
          <i class="pi pi-user text-blue-500 text-base"></i>
        </div>
        <div>
          <p class="font-semibold text-gray-800 text-base leading-tight">
            {{ isEdit ? 'Editar Usuario' : 'Nuevo Usuario' }}
          </p>
          <p class="text-xs text-gray-400 leading-tight">
            {{ isEdit ? 'Modifica los datos del usuario' : 'Registra un nuevo usuario en el sistema' }}
          </p>
        </div>
      </div>
      <button
        (click)="close()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
      >
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>
  </ng-template>

  <!-- Body -->
  <div class="flex flex-col gap-4 py-1">

    <!-- Nombre + DNI -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Nombre completo</label>
        <input
          pInputText
          [(ngModel)]="form.name"
          placeholder="Ej. Carlos Andrade"
          class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">DNI</label>
        <div class="flex items-center gap-2 rounded-xl border border-gray-200 px-3 h-10 focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-400">
          <i class="pi pi-id-card text-gray-400 text-sm"></i>
          <input
            pInputText
            [(ngModel)]="form.dni"
            placeholder="Ej. 30123456"
            class="border-0 outline-none shadow-none p-0 text-sm w-full bg-transparent"
          />
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-600">Correo electrónico</label>
      <div class="flex items-center gap-2 rounded-xl border border-gray-200 px-3 h-10 focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-400">
        <i class="pi pi-envelope text-gray-400 text-sm"></i>
        <input
          pInputText
          [(ngModel)]="form.email"
          placeholder="usuario@siscreditos.com"
          class="border-0 outline-none shadow-none p-0 text-sm w-full bg-transparent"
        />
      </div>
    </div>

    <!-- Rol + Sucursal -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Rol</label>
        <p-dropdown
          [(ngModel)]="form.role"
          [options]="roleOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar..."
          styleClass="w-full h-10 rounded-xl border-gray-200 text-sm"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Sucursal</label>
        <p-dropdown
          [(ngModel)]="form.branch"
          [options]="branchOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar..."
          styleClass="w-full h-10 rounded-xl border-gray-200 text-sm"
        />
      </div>
    </div>

    <!-- Contraseña -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-600">
        {{ isEdit ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña' }}
      </label>
      <div class="flex items-center gap-2 rounded-xl border border-gray-200 px-3 h-10 focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-400">
        <i class="pi pi-lock text-gray-400 text-sm"></i>
        <input
          type="password"
          pInputText
          [(ngModel)]="form.password"
          [placeholder]="isEdit ? '••••••••' : 'Mínimo 8 caracteres'"
          class="border-0 outline-none shadow-none p-0 text-sm w-full bg-transparent"
        />
      </div>
    </div>

    <!-- Estado -->
    <div class="flex items-center justify-between rounded-xl border border-gray-200 px-4 py-3">
      <div>
        <p class="text-sm font-medium text-gray-700">Estado del usuario</p>
        <p class="text-xs text-gray-400">{{ form.active ? 'El usuario puede iniciar sesión' : 'El usuario no puede iniciar sesión' }}</p>
      </div>
      <p-inputSwitch [(ngModel)]="form.active" />
    </div>

  </div>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="flex justify-between items-center pt-2">
      <button type="button" class="cancel-btn" (click)="close()">Cancelar</button>
      <p-button
        [label]="isEdit ? 'Guardar Cambios' : 'Crear Usuario'"
        icon="pi pi-save"
        iconPos="left"
        severity="primary"
        styleClass="h-11 px-5 rounded-xl"
        (onClick)="guardar()"
      />
    </div>
  </ng-template>
</p-dialog>
