<div class="space-y-4">

  <div class="flex items-center justify-between">
    <div class="relative">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
      <input
        pInputText
        [(ngModel)]="searchTerm"
        placeholder="Buscar tasa..."
        class="pl-9 pr-4 py-2 text-sm rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-100 w-56"
      />
    </div>
    <p-button
      label="Nueva Tasa"
      icon="pi pi-plus"
      iconPos="left"
      styleClass="h-9 px-4 rounded-xl !bg-blue-500 !border-blue-500 hover:!bg-blue-600 text-sm"
      (onClick)="openNew()"
    />
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <p-table [value]="filtered" styleClass="p-datatable-sm" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th class="text-xs font-semibold text-gray-500 uppercase">Producto</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Tasa Mensual</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Tasa Anual</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Mora</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Vigencia</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Estado</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-tasa>
        <tr class="hover:bg-gray-50/50 transition-colors">
          <td class="text-sm font-semibold text-gray-800">{{ tasa.producto }}</td>
          <td class="text-sm text-gray-700">{{ tasa.tasaMensual }}%</td>
          <td class="text-sm text-gray-700">{{ tasa.tasaAnual }}%</td>
          <td class="text-sm text-gray-700">{{ tasa.mora }}%</td>
          <td class="text-sm text-gray-500">{{ tasa.vigenciaDesde }} – {{ tasa.vigenciaHasta }}</td>
          <td>
            <p-tag
              [value]="tasa.activa ? 'Activa' : 'Inactiva'"
              [severity]="tasa.activa ? 'success' : 'secondary'"
            />
          </td>
          <td>
            <button
              (click)="openEdit(tasa)"
              class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:border-blue-300 hover:text-blue-500 transition-colors"
            >
              <i class="pi pi-pencil text-xs"></i>
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>

<app-rate-form-modal
  [(visible)]="showModal"
  [editRecord]="editRecord"
/>
