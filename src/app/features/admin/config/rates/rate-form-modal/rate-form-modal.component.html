<p-dialog
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '540px' }"
  styleClass="rounded-2xl overflow-hidden"
  [closable]="false"
>
  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
          <i class="pi pi-percentage text-blue-500 text-base"></i>
        </div>
        <div>
          <p class="font-semibold text-gray-800 text-base leading-tight">
            {{ isEdit ? 'Editar Tasa de Interés' : 'Nueva Tasa de Interés' }}
          </p>
          <p class="text-xs text-gray-400 leading-tight">Configura tasas para un producto financiero</p>
        </div>
      </div>
      <button
        (click)="close()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
      >
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>
  </ng-template>

  <!-- Body -->
  <div class="flex flex-col gap-4 py-1">

    <!-- Nombre + Tipo -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Nombre del producto</label>
        <input
          pInputText
          [(ngModel)]="form.producto"
          placeholder="Ej. Crédito Plus"
          class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Tipo de crédito</label>
        <p-dropdown
          [(ngModel)]="form.tipoCredito"
          [options]="tiposCredito"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar..."
          styleClass="w-full h-10 rounded-xl border-gray-200 text-sm"
        />
      </div>
    </div>

    <!-- Tasas section -->
    <div class="rounded-2xl border border-blue-100 bg-blue-50/30 p-4 flex flex-col gap-3">
      <p class="text-xs font-semibold text-blue-600 flex items-center gap-1">
        <i class="pi pi-percentage text-xs"></i> Tasas
      </p>
      <div class="grid grid-cols-2 gap-3">
        <!-- Tasa mensual -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Tasa mensual (%)</label>
          <div class="flex items-center gap-3 rounded-xl border border-blue-300 bg-white px-4 py-2.5 focus-within:ring-2 focus-within:ring-blue-100">
            <i class="pi pi-percentage text-blue-400 text-sm flex-shrink-0"></i>
            <p-inputNumber
              [(ngModel)]="form.tasaMensual"
              [minFractionDigits]="2"
              [maxFractionDigits]="2"
              [min]="0"
              [max]="100"
              styleClass="border-0 p-0 text-lg font-bold text-gray-800 w-full"
              inputStyleClass="border-0 outline-none shadow-none p-0 pl-2 text-lg font-bold text-gray-800 w-full bg-transparent"
            />
          </div>
        </div>
        <!-- Tasa anual calculada -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Tasa anual (calculada)</label>
          <div class="flex items-center gap-3 rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5">
            <span class="text-lg font-bold text-gray-500">{{ tasaAnual }}%</span>
            <span class="text-xs text-gray-400 ml-auto">automático</span>
          </div>
        </div>
        <!-- Tasa mora -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Tasa de mora (%)</label>
          <div class="flex items-center gap-3 rounded-xl border border-red-300 bg-white px-4 py-2.5 focus-within:ring-2 focus-within:ring-red-100">
            <i class="pi pi-percentage text-red-400 text-sm flex-shrink-0"></i>
            <p-inputNumber
              [(ngModel)]="form.tasaMora"
              [minFractionDigits]="2"
              [maxFractionDigits]="2"
              [min]="0"
              [max]="100"
              styleClass="border-0 p-0 text-lg font-bold text-gray-800 w-full"
              inputStyleClass="border-0 outline-none shadow-none p-0 pl-2 text-lg font-bold text-gray-800 w-full bg-transparent"
            />
          </div>
        </div>
        <!-- Plazo máx -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Plazo máx. (meses)</label>
          <div class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-2.5 focus-within:ring-2 focus-within:ring-blue-100">
            <i class="pi pi-calendar text-gray-400 text-sm flex-shrink-0"></i>
            <p-inputNumber
              [(ngModel)]="form.plazoMax"
              [min]="1"
              styleClass="border-0 p-0 text-lg font-bold text-gray-800 w-full"
              inputStyleClass="border-0 outline-none shadow-none p-0 pl-2 text-lg font-bold text-gray-800 w-full bg-transparent"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Vigencia -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Vigencia desde</label>
        <p-calendar
          [(ngModel)]="form.vigenciaDesde"
          dateFormat="dd/mm/yy"
          [showIcon]="true"
          iconDisplay="input"
          styleClass="w-full"
          inputStyleClass="w-full rounded-xl border border-gray-200 text-sm px-3 py-2"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Vigencia hasta</label>
        <p-calendar
          [(ngModel)]="form.vigenciaHasta"
          dateFormat="dd/mm/yy"
          [showIcon]="true"
          iconDisplay="input"
          placeholder="Sin vencimiento"
          styleClass="w-full"
          inputStyleClass="w-full rounded-xl border border-gray-200 text-sm px-3 py-2"
        />
      </div>
    </div>

    <!-- Estado + Notas -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Estado</label>
        <p-dropdown
          [(ngModel)]="form.activa"
          [options]="estadoOpciones"
          optionLabel="label"
          optionValue="value"
          styleClass="w-full h-10 rounded-xl text-sm"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-gray-600">Notas internas</label>
        <input
          pInputText
          [(ngModel)]="form.notas"
          placeholder="Opcional..."
          class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm"
        />
      </div>
    </div>

  </div>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="flex justify-between items-center pt-2">
      <button type="button" class="cancel-btn" (click)="close()">Cancelar</button>
      <p-button
        [label]="isEdit ? 'Guardar Cambios' : 'Guardar Tasa'"
        icon="pi pi-save"
        iconPos="left"
        severity="primary"
        styleClass="h-11 px-5 rounded-xl"
        (onClick)="guardar()"
      />
    </div>
  </ng-template>
</p-dialog>
