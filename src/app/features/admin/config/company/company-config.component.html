<div class="space-y-6">

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-5">
    <h2 class="text-base font-semibold text-gray-800">Datos de la Empresa</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Nombre del sistema</label>
        <input pInputText [(ngModel)]="systemName" class="w-full h-11 px-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 shadow-sm" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Email de contacto</label>
        <input pInputText [(ngModel)]="contactEmail" class="w-full h-11 px-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 shadow-sm" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Teléfono</label>
        <input pInputText [(ngModel)]="phone" class="w-full h-11 px-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 shadow-sm" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Dirección</label>
        <input pInputText [(ngModel)]="address" class="w-full h-11 px-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 shadow-sm" />
      </div>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-5">
    <h2 class="text-base font-semibold text-gray-800">Tasas de Interés</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Tasa VENTA (mensual)</label>
        <p-dropdown
          [options]="rateOptions"
          [(ngModel)]="saleRate"
          styleClass="w-full h-11 rounded-xl border-gray-200 flex items-center bg-white"
          appendTo="body"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Tasa PRÉSTAMO (mensual)</label>
        <p-dropdown
          [options]="rateOptions"
          [(ngModel)]="loanRate"
          styleClass="w-full h-11 rounded-xl border-gray-200 flex items-center bg-white"
          appendTo="body"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Tasa MORA (diaria)</label>
        <p-dropdown
          [options]="moraOptions"
          [(ngModel)]="moraRate"
          styleClass="w-full h-11 rounded-xl border-gray-200 flex items-center bg-white"
          appendTo="body"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-500">Comisión Vendedor</label>
        <p-dropdown
          [options]="commissionOptions"
          [(ngModel)]="sellerCommission"
          styleClass="w-full h-11 rounded-xl border-gray-200 flex items-center bg-white"
          appendTo="body"
        />
      </div>
    </div>
    <div class="flex items-center gap-3">
      <label class="text-sm text-gray-500 whitespace-nowrap">Periodo de gracia (días sin acción):</label>
      <p-inputNumber
        [(ngModel)]="gracePeriod"
        [min]="0"
        [max]="90"
        inputStyleClass="w-20 h-11 text-center rounded-xl border border-gray-200 shadow-sm"
      />
      <span class="text-sm text-gray-400">días. Recuerdo a 30d, alerta a 45d.</span>
    </div>
  </div>

  <div>
    <p-button
      label="Guardar cambios"
      icon="pi pi-save"
      iconPos="left"
      styleClass="h-11 px-5 rounded-xl !bg-blue-500 !border-blue-500 hover:!bg-blue-600"
      (onClick)="save()"
    />
  </div>

</div>
