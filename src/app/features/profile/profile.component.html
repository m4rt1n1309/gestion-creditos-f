<p-toast position="top-right" />

<div class="p-6 max-w-6xl mx-auto">
  <p class="text-sm text-gray-400 mb-6">/ Mi Perfil</p>

  <div class="flex flex-col lg:flex-row gap-6">
    <div class="w-full lg:w-64 shrink-0">
      <div
        class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 flex flex-col items-center text-center gap-3"
      >
        @if (currentUser) {
          <p-avatar
            [label]="currentUser.avatar"
            shape="circle"
            size="xlarge"
            styleClass="bg-blue-600 text-white font-bold text-2xl w-20 h-20"
          />
          <div>
            <p class="text-lg font-bold text-gray-900">
              {{ currentUser.full_name }}
            </p>
            <p-tag [value]="roleLabel" styleClass="mt-1 text-xs" />
            <p class="text-sm text-gray-500 mt-2">{{ currentUser.email }}</p>
          </div>
        }

        <button
          pRipple
          (click)="logout()"
          class="mt-2 w-full flex items-center justify-center gap-2 px-4 py-2 rounded-xl border border-red-200 text-red-500 hover:bg-red-50 transition-colors text-sm font-medium"
        >
          <i class="pi pi-sign-out"></i>
          Cerrar Sesión
        </button>
      </div>
    </div>

    <div class="flex-1 flex flex-col gap-6">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-base font-bold text-gray-900 mb-5">Datos Personales</h2>

        <form
          [formGroup]="personalForm"
          (ngSubmit)="savePersonal()"
          class="flex flex-col gap-4"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-semibold text-gray-700">Nombre</label>
              <p-iconField iconPosition="left">
                <p-inputIcon styleClass="pi pi-user text-gray-400 z-10" />
                <input
                  pInputText
                  formControlName="nombre"
                  class="w-full h-11 pl-10 rounded-xl"
                />
              </p-iconField>
            </div>

            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-semibold text-gray-700">Email</label>
              <p-iconField iconPosition="left">
                <p-inputIcon styleClass="pi pi-envelope text-gray-400 z-10" />
                <input
                  pInputText
                  formControlName="email"
                  class="w-full h-11 pl-10 rounded-xl bg-gray-50"
                />
              </p-iconField>
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-gray-700">Teléfono</label>
            <p-iconField iconPosition="left">
              <p-inputIcon styleClass="pi pi-phone text-gray-400 z-10" />
              <input
                pInputText
                formControlName="telefono"
                class="w-full h-11 pl-10 rounded-xl"
              />
            </p-iconField>
          </div>

          <div class="flex justify-end">
            <p-button
              type="submit"
              label="Guardar datos"
              styleClass="py-2.5 px-6"
              [loading]="loadingPersonal"
            />
          </div>
        </form>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-base font-bold text-gray-900 mb-5">
          Cambiar Contraseña
        </h2>

        <form
          [formGroup]="passwordForm"
          (ngSubmit)="changePassword()"
          class="flex flex-col gap-4"
        >
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-semibold text-gray-700"
                >Contraseña actual</label
              >
              <p-iconField iconPosition="left">
                <p-inputIcon styleClass="pi pi-lock text-gray-400 z-10" />
                <p-password
                  formControlName="currentPassword"
                  [feedback]="false"
                  [toggleMask]="true"
                  styleClass="w-full"
                  inputStyleClass="w-full h-11 pl-10"
                  placeholder="••••••••"
                />
              </p-iconField>
            </div>

            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-semibold text-gray-700"
                >Nueva contraseña</label
              >
              <p-iconField iconPosition="left">
                <p-inputIcon styleClass="pi pi-lock text-gray-400 z-10" />
                <p-password
                  formControlName="newPassword"
                  [feedback]="false"
                  [toggleMask]="true"
                  styleClass="w-full"
                  inputStyleClass="w-full h-11 pl-10"
                  placeholder="••••••••"
                />
              </p-iconField>
            </div>

            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-semibold text-gray-700"
                >Confirmar contraseña</label
              >
              <p-iconField iconPosition="left">
                <p-inputIcon styleClass="pi pi-lock text-gray-400 z-10" />
                <p-password
                  formControlName="confirmPassword"
                  [feedback]="false"
                  [toggleMask]="true"
                  styleClass="w-full"
                  inputStyleClass="w-full h-11 pl-10"
                  placeholder="••••••••"
                />
              </p-iconField>
            </div>
          </div>

          <div>
            <p-button
              type="submit"
              label="Cambiar contraseña"
              styleClass="py-2.5 px-6"
              [loading]="loadingPassword"
            />
          </div>
        </form>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-base font-bold text-gray-900 mb-5">Preferencias</h2>

        <div class="flex flex-col divide-y divide-gray-100">
          <div class="flex items-center justify-between py-4">
            <span class="text-sm text-gray-700"
              >Recibir notificaciones por email</span
            >
            <p-inputSwitch [(ngModel)]="emailNotifications" />
          </div>
          <div class="flex items-center justify-between py-4">
            <span class="text-sm text-gray-700">Modo oscuro</span>
            <p-inputSwitch [(ngModel)]="darkMode" />
          </div>
          <div class="flex items-center justify-between py-4">
            <span class="text-sm text-gray-700">Idioma</span>
            <p-dropdown
              [(ngModel)]="selectedLanguage"
              [options]="languages"
              optionLabel="label"
              optionValue="value"
              styleClass="w-36"
            />
          </div>
        </div>

        <div class="mt-4">
          <p-button
            label="Guardar cambios"
            styleClass="w-full justify-center py-2.5"
            [loading]="loadingPrefs"
            (onClick)="savePreferences()"
          />
        </div>
      </div>
    </div>
  </div>
</div>
