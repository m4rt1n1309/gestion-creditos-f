<p-dialog
  header="Contraseña temporal generada"
  [visible]="visible"
  [closable]="false"
  [modal]="true"
  [style]="{ width: '38rem' }"
>
  <div class="flex flex-col gap-4">
    <p class="text-sm text-gray-600">
      Esta contraseña se muestra <strong>una sola vez</strong>. Anotala y
      comunicala antes de cerrar este diálogo.
    </p>
    <div class="flex items-center gap-3 bg-gray-100 rounded-xl px-4 py-3">
      <code class="flex-1 text-xl font-mono tracking-widest break-all select-all">{{
        password
      }}</code>
      <p-button
        icon="pi pi-copy"
        severity="secondary"
        [outlined]="true"
        styleClass="h-10 w-10 rounded-lg"
        pTooltip="Copiar al portapapeles"
        (onClick)="copy()"
      />
    </div>
    @if (copySuccess) {
      <small class="text-green-600">¡Copiado!</small>
    }
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Ya la anoté y la comuniqué"
      icon="pi pi-check"
      severity="primary"
      styleClass="h-11 px-5 rounded-xl"
      (onClick)="confirm()"
    />
  </ng-template>
</p-dialog>
