<p-toast position="top-right" />
<div class="flex flex-col h-full" style="background: var(--ff-bg)">
  <!-- Header / step bar -->
  <div
    class="shrink-0 px-6 py-3 flex items-center gap-4"
    style="
      background: var(--ff-panel);
      border-bottom: 1px solid var(--ff-border);
    "
  >
    <h1
      class="text-xl font-bold shrink-0"
      style="color: var(--ff-text-primary)"
    >
      Nueva Operación de Crédito
    </h1>

    <div class="flex-1">
      <p-steps
        [model]="steps"
        [(activeIndex)]="activeIndex"
        [readonly]="true"
        styleClass="[&_.p-steps-list]:justify-center"
      />
    </div>

    <p-button
      icon="pi pi-times"
      [text]="true"
      [rounded]="true"
      severity="secondary"
      routerLink="../"
      pTooltip="Cancelar operación"
    />
  </div>

  <!-- Step content -->
  <div class="flex-1 overflow-y-auto p-6 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
      <div class="ff-panel p-6 md:p-8 min-h-[450px] flex flex-col">
        <div class="flex-1">
          @switch (activeIndex) {
            @case (0) {
              <app-step-client class="animate-fadein block" />
            }
            @case (1) {
              <app-step-products class="animate-fadein block" />
            }
            @case (2) {
              <app-step-conditions class="animate-fadein block" />
            }
            @case (3) {
              <app-step-confirm class="animate-fadein block" />
            }
          }
        </div>

        <!-- Navigation bar -->
        <div
          class="flex justify-between items-center mt-8 pt-6"
          style="border-top: 1px solid var(--ff-border)"
        >
          <div class="text-sm font-medium" style="color: var(--ff-text-muted)">
            Paso {{ activeIndex + 1 }} de 4 · {{ steps?.[activeIndex]?.label }}
          </div>

          <div class="flex items-center gap-3">
            @if (activeIndex === 0) {
              <p-button
                label="Cancelar"
                severity="danger"
                [text]="true"
                routerLink="../"
                styleClass="h-11 px-5"
                data-cy="btn-cancelar-wizard"
              />
            } @else {
              <p-button
                label="Anterior"
                icon="pi pi-arrow-left"
                severity="secondary"
                [outlined]="true"
                (onClick)="prevStep()"
                styleClass="h-11 px-5"
                data-cy="btn-anterior-wizard"
              />
            }

            @if (activeIndex < 3) {
              <p-button
                label="Siguiente"
                icon="pi pi-arrow-right"
                iconPos="right"
                severity="primary"
                styleClass="h-11 px-6 rounded-xl"
                [disabled]="!canNext"
                (onClick)="nextStep()"
                data-cy="btn-siguiente-wizard"
              />
            } @else {
              <p-button
                label="Enviar para Aprobación"
                icon="pi pi-check"
                severity="success"
                styleClass="h-11 px-6 rounded-xl"
                [disabled]="!isConfirmed || submitting"
                [loading]="submitting"
                (onClick)="finish()"
                data-cy="btn-enviar-aprobacion"
              />
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
