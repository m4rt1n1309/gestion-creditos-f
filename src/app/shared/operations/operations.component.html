<div class="p-6">
  <div class="ff-panel">
    <div class="ff-list-header">
      <span class="ff-list-header__title">Operaciones</span>
      <div class="ff-list-header__actions">
        <p-button
          label="Nueva Operación"
          icon="pi pi-plus"
          severity="primary"
          styleClass="h-11 px-5 rounded-xl shadow-sm"
          routerLink="./new"
        />

        <p-dialog
          [(visible)]="showNewOperationModal"
          [modal]="true"
          [maximizable]="true"
          [draggable]="false"
          [resizable]="false"
          [style]="{ width: '90vw', maxWidth: '1100px' }"
          [breakpoints]="{ '1199px': '95vw', '575px': '100vw' }"
          header="Registrar Nueva Operación"
        >
        </p-dialog>

        <p-dropdown
          [options]="statusOptions"
          [(ngModel)]="selectedStatus"
          placeholder="Estado"
          styleClass="h-11"
        />

        <p-iconField iconPosition="left">
          <p-inputIcon
            styleClass="pi pi-search z-10"
            style="color: var(--ff-text-muted)"
          />
          <input
            pInputText
            type="text"
            placeholder="Buscar..."
            [(ngModel)]="searchTerm"
            class="h-11 pl-10 w-full md:w-64"
          />
        </p-iconField>
      </div>
    </div>

    <p-table
      [value]="filteredOperations"
      styleClass="p-datatable-sm"
      [responsiveLayout]="'scroll'"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Tipo</th>
          <th>Monto</th>
          <th>Cuotas</th>
          <th class="text-center">Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-op>
        <tr>
          <td style="color: var(--ff-text-secondary)">{{ op.date }}</td>
          <td class="font-bold">{{ op.client }}</td>
          <td>
            <span
              class="text-xs font-bold"
              [style.color]="
                op.type === 'VENTA' ? 'var(--ff-accent)' : '#A78BFA'
              "
              >{{ op.type }}</span
            >
          </td>
          <td class="ff-mono font-bold">
            {{ op.amount | currencyArs }}
          </td>
          <td style="color: var(--ff-text-secondary)">{{ op.installments }}</td>
          <td class="text-center">
            <span
              class="ff-badge"
              [class.ff-badge--activo]="
                getStatusSeverity(op.status) === 'success'
              "
              [class.ff-badge--pendiente]="
                getStatusSeverity(op.status) === 'warning'
              "
              [class.ff-badge--vencido]="
                getStatusSeverity(op.status) === 'danger'
              "
              [class.ff-badge--pagado]="
                getStatusSeverity(op.status) === 'secondary'
              "
              >{{ op.status }}</span
            >
          </td>
          <td class="text-center">
            <p-button
              label="Ver"
              severity="secondary"
              [outlined]="true"
              size="small"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
