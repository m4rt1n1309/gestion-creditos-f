@if (!isPortalRoute() && (auth.currentUser$ | async)) {

    class="flex h-dvh w-full overflow-hidden"
    style="background: var(--ff-bg)"
  >
    <sidebar />
    <div class="flex flex-col flex-1 overflow-hidden">
      <app-header />
      <main class="flex-1 overflow-y-auto" style="background: var(--ff-bg)">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}
